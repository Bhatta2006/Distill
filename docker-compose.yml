version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: lucid
      POSTGRES_USER: lucid
      POSTGRES_PASSWORD: lucid
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://lucid:lucid@db:5432/lucid
      REDIS_URL: redis://redis:6379/0
      STORAGE_PATH: /data/uploads
    volumes:
      - ./backend:/app
      - uploads:/data/uploads
    depends_on:
      - db
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://lucid:lucid@db:5432/lucid
      REDIS_URL: redis://redis:6379/0
      STORAGE_PATH: /data/uploads
    volumes:
      - ./backend:/app
      - uploads:/data/uploads
    depends_on:
      - db
      - redis
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000

volumes:
  pgdata:
  uploads:
